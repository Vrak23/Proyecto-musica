<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Proyecto Música</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card shadow-lg">
        <div class="text-center mb-4">
            <h2 class="login-title">Iniciar Sesión</h2>
            <div class="title-underline"></div>
        </div>
        
        <form id="formLogin">
            <label class="form-label small fw-bold text-secondary">Usuario</label>
            <div class="input-group mb-3">
                <span class="input-group-text icon-box"><i class="fas fa-user"></i></span>
                <input type="text" id="usuario" class="form-control login-input" placeholder="Nombre de usuario" required>
            </div>

            <label class="form-label small fw-bold text-secondary">Contraseña</label>
            <div class="input-group mb-4">
                <span class="input-group-text icon-box"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control login-input" placeholder="Escribe tu contraseña" required>
            </div>

            <button type="submit" class="btn-login shadow-sm">
                <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
            </button>

            <div class="text-center mt-4">
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/login.js"></script>
</body>
</html>
